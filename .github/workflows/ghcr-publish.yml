name: Build and Push to GHCR
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
    workflow_dispatch:

    env:
  REGISTRY: ghcr.io
  IMAGE_NAME: chetan-star-bit/employee_api_test

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
       name: Tag and push latest
        run: |
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # --- SBOM generation ---
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cyclonedx.json

      - name: Print pushed digest
        run: echo "Pushed digest -> ${{ steps.push.outputs.digest }}"
      
      
      - name: Build and push
        run: |
          docker build -t ghcr.io/chetan-star-bit/employee_api_test:latest .
          docker push ghcr.io/chetan-star-bit/employee_api_test:latest
