name: Build and Push to GHCR
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
    workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        run: |
          docker build -t ghcr.io/chetan-star-bit/employee_api_test:latest .
          docker push ghcr.io/chetan-star-bit/employee_api_test:latest
